---
name: "Build"

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Install UV"
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: "Run tests"
        run: |
          uv run --locked syncpyproject_test.py

      - name: "Test release script"
        run: |
          uv run --with-requirements release.py pytest release.py

      - name: "Lint Python files"
        run: |
          uvx ruff check release.py
          uvx ruff format --check release.py

      - name: "Type check release script"
        run: |
          uvx --with-requirements release.py --with ty ty check release.py

      - name: "Lint YAML files"
        run: |
          uvx yamllint --strict .
