name: Sync pyproject versions from uv.lock
description: Update dependency version tokens in pyproject.toml to match uv.lock.
inputs:
  directory:
    description: Directory containing pyproject.toml and uv.lock.
    required: false
    default: "."
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install action dependencies
      shell: bash
      run: |
        python -m pip install --disable-pip-version-check tomlkit typer

    - name: Sync pyproject versions
      shell: bash
      run: |
        python "$GITHUB_ACTION_PATH/syncpyproject.py" "${{ inputs.directory }}"

